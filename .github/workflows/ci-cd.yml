name: 🌾 AgroMarket Bolivia CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_PREFIX: agromarket

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Code Quality
  # ─────────────────────────────────────────────────────────────────
  quality:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: ESLint
        run: npm run lint
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # API Tests (NestJS)
  # ─────────────────────────────────────────────────────────────────
  test-api:
    name: 🧪 API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: agromarket_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/agromarket_test

      - name: Run API unit tests
        run: npm run test --workspace=apps/api
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/agromarket_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: apps/api/coverage
          flags: api

  # ─────────────────────────────────────────────────────────────────
  # Scoring Tests (Python)
  # ─────────────────────────────────────────────────────────────────
  test-scoring:
    name: 🧪 Scoring Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r apps/scoring/requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest apps/scoring/tests/ -v
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # Web Build
  # ─────────────────────────────────────────────────────────────────
  build-web:
    name: 🏗️ Build Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.agromarket.bo/api/v1

  # ─────────────────────────────────────────────────────────────────
  # Docker Build & Push (main branch only)
  # ─────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [quality, test-api, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        app: [api, web, scoring]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DO Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DO_REGISTRY_TOKEN }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          target: production
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # Deploy to Kubernetes (main branch only)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save agromarket-prod

      - name: Deploy API
        run: |
          kubectl set image deployment/agromarket-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }} \
            --namespace=production

      - name: Deploy Web
        run: |
          kubectl set image deployment/agromarket-web \
            web=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ github.sha }} \
            --namespace=production

      - name: Deploy Scoring
        run: |
          kubectl set image deployment/agromarket-scoring \
            scoring=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/scoring:${{ github.sha }} \
            --namespace=production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/agromarket-api --namespace=production --timeout=5m
          kubectl rollout status deployment/agromarket-web --namespace=production --timeout=5m

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment ${{ job.status }} for commit ${{ github.sha }}"
