version: '3.8'

services:
  # ─────────────────────────────────────────────
  # NestJS API Principal
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: agromarket-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/agromarket
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_ACCESS_EXPIRY: '900'
      JWT_REFRESH_EXPIRY: '2592000'
      DO_SPACES_ENDPOINT: http://minio:9000
      DO_SPACES_BUCKET: agromarket-files
      DO_SPACES_KEY: minioadmin
      DO_SPACES_SECRET: minioadmin
      DO_SPACES_REGION: us-east-1
      SCORING_SERVICE_URL: http://scoring:8000
      SCORING_SERVICE_API_KEY: dev-scoring-key
      PORT: '3000'
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # Next.js Web Frontend
  # ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: agromarket-web
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: your-google-maps-key
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # Python FastAPI — Scoring Service
  # ─────────────────────────────────────────────
  scoring:
    build:
      context: ./apps/scoring
      dockerfile: Dockerfile
    container_name: agromarket-scoring
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/agromarket
      API_KEY: dev-scoring-key
      MODEL_PATH: /app/models
      ENVIRONMENT: development
    volumes:
      - ./apps/scoring:/app
      - scoring-models:/app/models
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # PostgreSQL + PostGIS
  # ─────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: agromarket-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: agromarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agromarket']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agromarket-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # Elasticsearch 8
  # ─────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: agromarket-elasticsearch
    restart: unless-stopped
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # MinIO (S3-compatible storage para dev)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: agromarket-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # Nginx API Gateway
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agromarket-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - web
    networks:
      - agromarket-network

  # ─────────────────────────────────────────────
  # Adminer (DB Admin UI para desarrollo)
  # ─────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: agromarket-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - agromarket-network

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local
  minio-data:
    driver: local
  scoring-models:
    driver: local

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  agromarket-network:
    driver: bridge
