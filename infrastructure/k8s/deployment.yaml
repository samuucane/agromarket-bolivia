apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    app: agromarket

---
# ─── API Deployment ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agromarket-api
  namespace: production
  labels:
    app: agromarket-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agromarket-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agromarket-api
    spec:
      containers:
        - name: api
          image: registry.digitalocean.com/agromarket/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: agromarket-secrets
            - configMapRef:
                name: agromarket-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agromarket-api
  namespace: production
spec:
  selector:
    app: agromarket-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

---
# ─── Web Deployment ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agromarket-web
  namespace: production
  labels:
    app: agromarket-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agromarket-web
  template:
    metadata:
      labels:
        app: agromarket-web
    spec:
      containers:
        - name: web
          image: registry.digitalocean.com/agromarket/web:latest
          ports:
            - containerPort: 3001
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.agromarket.bo/api/v1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: agromarket-web
  namespace: production
spec:
  selector:
    app: agromarket-web
  ports:
    - port: 3001
      targetPort: 3001

---
# ─── Scoring Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agromarket-scoring
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agromarket-scoring
  template:
    metadata:
      labels:
        app: agromarket-scoring
    spec:
      containers:
        - name: scoring
          image: registry.digitalocean.com/agromarket/scoring:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: agromarket-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: agromarket-scoring
  namespace: production
spec:
  selector:
    app: agromarket-scoring
  ports:
    - port: 8000
      targetPort: 8000

---
# ─── Ingress ─────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agromarket-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  tls:
    - hosts:
        - agromarket.bo
        - api.agromarket.bo
      secretName: agromarket-tls
  rules:
    - host: agromarket.bo
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agromarket-web
                port:
                  number: 3001
    - host: api.agromarket.bo
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agromarket-api
                port:
                  number: 3000

---
# ─── HPA ─────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agromarket-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agromarket-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
